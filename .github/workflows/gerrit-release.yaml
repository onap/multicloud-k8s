---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Gerrit-sourced release caller for the reusable Go
# build-test-release workflow (Model A: tag-driven).
#
# For Gerrit projects the release tag gets pushed to Gerrit and
# replicated to the GitHub mirror, where it fires this standard
# tag-push event. There is no Gerrit change context on a tag, so no
# votes or comments get cast. The pushed tag must be semantic version
# (semver) and signed; development/pre-release tags get rejected.
#
# Go module consumers fetch releases through the module proxy straight
# from the tag; no separate registry publish job is necessary.
name: 'Gerrit Release'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '**'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  release:
    name: 'Build/Test/Release'
    # Skip tag deletion events
    if: "!github.event.deleted"
    permissions:
      contents: write       # Create the GitHub release / attach assets
      id-token: write       # OIDC for build provenance attestations
      attestations: write   # Build provenance attestations
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/go-workflows/.github/workflows/build-test-release.yaml@f12d296a955b6dfbafcec835613141198928cb71  # v0.0.2
    with:
      path_prefix: 'src/k8splugin'
      # go.mod declares Go 1.16, too old for the release toolchain
      go_version: '1.25'
      # The tree carries Go plugin sources (package main without
      # func main) that break a plain ./... probe; build the CLI
      # entry point, named to match the Makefile binary output
      build_target: './cmd'
      output_name: 'k8plugin'
      # The k8splugin targets Linux container deployments; Go plugins
      # rule out meaningful darwin/windows binaries
      release_goos: 'linux'
      release_goarch: 'amd64,arm64'
      # Soft-fail legs: env-dependent test failures, audit findings
      # and medium+ CVEs in the legacy dependency tree would
      # otherwise block every release
      test_permit_fail: true
      audit_permit_fail: true
      grype_permit_fail: true
