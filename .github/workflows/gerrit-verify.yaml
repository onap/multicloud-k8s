---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Gerrit-wrapped caller for the reusable Go build-test workflow.
# gerrit_to_platform dispatches this workflow (via the GitHub API) when
# a patchset is created in Gerrit; it then votes Verified +/-1 on the
# change. GERRIT_DISABLED permits manual runs from the GitHub UI
# without Gerrit (the clear/vote jobs are skipped and a normal checkout
# gets used).
name: 'Gerrit Verify'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:
        description: 'Branch that change is against'
        required: false
        type: string
        default: ''
      GERRIT_CHANGE_ID:
        description: 'The ID for the change'
        required: false
        type: string
        default: ''
      GERRIT_CHANGE_NUMBER:
        description: 'The Gerrit number'
        required: false
        type: string
        default: ''
      GERRIT_CHANGE_URL:
        description: 'URL to the change'
        required: false
        type: string
        default: ''
      GERRIT_EVENT_TYPE:
        description: 'Type of Gerrit event'
        required: false
        type: string
        default: ''
      GERRIT_PATCHSET_NUMBER:
        description: 'The patch number for the change'
        required: false
        type: string
        default: ''
      GERRIT_PATCHSET_REVISION:
        description: 'The revision sha'
        required: false
        type: string
        default: ''
      GERRIT_PROJECT:
        description: 'Project in Gerrit'
        required: false
        type: string
        default: ''
      GERRIT_REFSPEC:
        description: 'Gerrit refspec of change'
        required: false
        type: string
        default: ''
      GERRIT_DISABLED:
        description: 'Run without Gerrit components'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Clear any previous Verified vote so the change starts from a clean state.
  clear-vote:
    name: 'Clear vote'
    if: inputs.GERRIT_DISABLED != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Harden runner'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: 'Clear votes'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13  # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          # Review-only Gerrit SSH voting key; not gated by an Environment
          # yamllint disable-line rule:line-length
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}  # zizmor: ignore[secrets-outside-env]
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear
      - name: 'Allow replication'
        run: sleep 10s

  # Call the reusable build-test workflow. When dispatched by Gerrit, the
  # gerrit_* inputs drive checkout-gerrit-change-action inside the reusable
  # workflow. For a manual GERRIT_DISABLED run, the GERRIT_* inputs are empty
  # so the reusable workflow performs a normal checkout.
  build-test:
    needs: clear-vote
    if: >-
      always()
      && (needs.clear-vote.result == 'success'
          || needs.clear-vote.result == 'skipped')
    permissions:
      contents: read
      pull-requests: read  # repository-metadata-action queries PR data
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/go-workflows/.github/workflows/build-test.yaml@a1a9d4d574d6de4c71a7b05dfd1f15027e73b08a  # v0.3.0
    with:
      # When GERRIT_DISABLED is true the gerrit_* values are blanked so the
      # reusable workflow falls back to a standard checkout.
      # yamllint disable-line rule:line-length
      gerrit_refspec: ${{ !inputs.GERRIT_DISABLED && inputs.GERRIT_REFSPEC || '' }}
      # yamllint disable-line rule:line-length
      gerrit_project: ${{ !inputs.GERRIT_DISABLED && inputs.GERRIT_PROJECT || '' }}
      # yamllint disable-line rule:line-length
      gerrit_branch: ${{ !inputs.GERRIT_DISABLED && inputs.GERRIT_BRANCH || '' }}
      # gerrit_url falls back to the GERRIT_URL repository variable.
      path_prefix: 'src/k8splugin'
      # The internal/app tests load a Go plugin (mockplugin.so) that
      # the repository does not ship; a plain 'go test' skips that
      # build and those tests fail. Delegate the test run to the
      # project Makefile 'test' target via go-test-action's make_args,
      # which compiles the plugin before running the full suite.
      test_make_args: 'test'
      # The tree carries Go plugin sources (package main without
      # func main) that break a plain ./... build; compile the CLI
      # entry point and libraries instead.
      build_target: './cmd ./internal/...'
      # go.mod declares Go 1.16, too old to derive a matrix from
      go_version_matrix: '["1.25"]'
      gosec: true
      staticcheck: true
      # Tests now run via the Makefile 'test' target (test_make_args
      # above), which compiles the mock plugin and passes the full
      # suite, so test failures block the change (permit_fail off).
      test_permit_fail: false
      # Soft-fail legs: gosec/staticcheck findings and medium+ CVEs in
      # the legacy dependency tree would otherwise block every change;
      # report without voting -1
      lint_permit_fail: true
      audit_permit_fail: true
      grype_permit_fail: true

  # Report the overall workflow conclusion back to Gerrit as a Verified vote.
  vote:
    name: 'Set Verified vote'
    if: ${{ always() && inputs.GERRIT_DISABLED != true }}
    needs: [clear-vote, build-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # workflow-conclusion queries the Actions API to list run jobs
      actions: read  # workflow-conclusion queries the Actions API
    timeout-minutes: 5
    steps:
      - name: 'Harden runner'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: 'Get conclusion'
        # yamllint disable-line rule:line-length
        uses: im-open/workflow-conclusion@8eac7f17381a6917bc04fec3e2c92e70ebc37526  # v3.0.0
      - name: 'Set vote'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13  # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          # Review-only Gerrit SSH voting key; not gated by an Environment
          # yamllint disable-line rule:line-length
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}  # zizmor: ignore[secrets-outside-env]
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: ${{ env.WORKFLOW_CONCLUSION }}
